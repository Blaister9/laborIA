worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json text/event-stream;

    # ── Upstream: FastAPI backend ─────────────────────────────────────────────
    upstream laboria_backend {
        server backend:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todo lo demás → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: API backend ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.laboria.app;    # <-- CAMBIAR por tu dominio

        ssl_certificate     /etc/nginx/certs/live/api.laboria.app/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/api.laboria.app/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;

        # SSE: deshabilitar buffering para streaming en tiempo real
        proxy_buffering off;
        proxy_cache off;

        # Timeouts generosos para respuestas largas del agente (~30 seg)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        location / {
            proxy_pass http://laboria_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE headers
            proxy_set_header Accept-Encoding "";
            add_header X-Accel-Buffering no;
        }

        # Health check directo (sin logs para no spam)
        location /health {
            proxy_pass http://laboria_backend/health;
            access_log off;
        }
    }
}
